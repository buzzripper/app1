<div class="flex flex-auto flex-col">
    <!-- Header -->
    <div class="flex flex-col border-b px-6 py-8 sm:flex-row sm:items-center sm:justify-between">
        <div class="text-4xl font-extrabold tracking-tight">Clients</div>
        <div class="mt-6 flex shrink-0 items-center sm:ml-4 sm:mt-0">
            <!-- Search -->
            <mat-form-field class="fuse-mat-dense fuse-mat-rounded min-w-64" subscriptSizing="dynamic">
                <mat-icon class="icon-size-5" matPrefix [svgIcon]="'heroicons_solid:magnifying-glass'"></mat-icon>
                <input matInput [formControl]="searchInputControl" [autocomplete]="'off'" placeholder="Search clients" />
            </mat-form-field>
            <!-- Add button -->
            <button class="ml-4" mat-flat-button [color]="'primary'" (click)="createClient()">
                <mat-icon [svgIcon]="'heroicons_outline:plus'"></mat-icon>
                <span class="ml-2 mr-1">Add</span>
            </button>
        </div>
    </div>

    <!-- Loading bar -->
    @if (isLoading) {
        <mat-progress-bar [mode]="'indeterminate'"></mat-progress-bar>
    }

    <!-- Grid header -->
    <div class="clients-grid sticky top-0 z-10 grid gap-4 bg-gray-50 px-6 py-4 font-semibold shadow dark:bg-black dark:bg-opacity-5">
        <div>Name</div>
        <div class="hidden sm:block">Key</div>
        <div class="hidden sm:block">Base URL</div>
    </div>

    <!-- Rows -->
    <div class="flex-auto overflow-y-auto">
        @for (client of filteredClients; track trackByFn($index, client)) {
            <div
                class="clients-grid grid cursor-pointer items-center gap-4 border-b px-6 py-3 transition-colors hover:bg-gray-100 dark:hover:bg-white/5"
                role="button"
                tabindex="0"
                (click)="openClient(client.id)"
                (keydown.enter)="openClient(client.id)"
            >
                <!-- Name -->
                <div class="truncate">{{ client.name }}</div>

                <!-- Key -->
                <div class="hidden truncate sm:block">{{ client.key }}</div>

                <!-- Base URL -->
                <div class="hidden truncate sm:block">{{ client.baseUrl }}</div>
            </div>
        } @empty {
            <div class="flex items-center justify-center border-b px-6 py-10 text-secondary">
                No clients found.
            </div>
        }
    </div>
</div>
